<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Resultado do Formulário</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Dados Recebidos</h2>
    <ul class="list-group">
        <li class="list-group-item"><strong>Nome:</strong> {{ nome }}</li>
        <li class="list-group-item"><strong>Curso:</strong> {{ curso }}</li>
        <li class="list-group-item"><strong>Cidade:</strong> {{ cidade }}</li>
        <li class="list-group-item"><strong>E-mail:</strong> {{ email }}</li>
    </ul>
    <a href="/" class="btn btn-secondary mt-3">Voltar</a>
</body>
</html>
